<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ShopEasy</title>
  <meta name="description" content="Sign in to your ShopEasy account or create a new one to start shopping."/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body style="background:var(--bg);">

<!-- minimal header for auth page -->
<div style="background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:center;">
  <a href="index.html" class="logo" style="font-size:1.4rem;font-weight:800;color:var(--green);">
    Shop<span style="color:var(--accent);">Easy</span>
  </a>
</div>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-box-top">
      <h1>Welcome to ShopEasy</h1>
      <p>Sign in or create an account to continue</p>
    </div>

    <div class="auth-body">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" id="tab-reg" onclick="switchTab('register')">Create Account</div>
      </div>

      <!-- LOGIN -->
      <form id="form-login" onsubmit="doLogin(event)">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required/>
        </div>
        <button class="btn btn-green btn-full btn-lg" type="submit" id="btn-login" style="margin-top:.5rem;">
          Sign In →
        </button>
        <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;margin-top:.9rem;">
          Don't have an account? <button type="button" onclick="switchTab('register')" style="color:var(--green);font-weight:600;font-size:0.78rem;">Create one free</button>
        </p>
      </form>

      <!-- REGISTER -->
      <form id="form-reg" onsubmit="doRegister(event)" style="display:none;">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input class="form-input" type="text" id="reg-name" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" required/>
        </div>
        <button class="btn btn-green btn-full btn-lg" type="submit" id="btn-reg" style="margin-top:.5rem;">
          Create Account →
        </button>
        <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;margin-top:.9rem;">
          Already have an account? <button type="button" onclick="switchTab('login')" style="color:var(--green);font-weight:600;font-size:0.78rem;">Sign in</button>
        </p>
      </form>

      <div class="divider"></div>

      <p style="font-size:0.72rem;color:var(--text-muted);text-align:center;line-height:1.6;">
        By continuing, you agree to ShopEasy's Terms of Service and Privacy Policy.
      </p>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (getUser()) window.location.href = "products.html";

  function switchTab(tab) {
    const isLogin = tab === "login";
    document.getElementById("tab-login").classList.toggle("active", isLogin);
    document.getElementById("tab-reg").classList.toggle("active", !isLogin);
    document.getElementById("form-login").style.display = isLogin ? "" : "none";
    document.getElementById("form-reg").style.display   = isLogin ? "none" : "";
  }

  async function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById("login-email").value.trim();
    const btn   = document.getElementById("btn-login");
    btn.disabled = true; btn.textContent = "Signing in...";
    try {
      const res  = await fetch(`${API}/auth/login`, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ email }) });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || "Sign in failed", "error"); return; }
      setUser(data);
      showToast(`Welcome back, ${data.name}!`, "success");
      setTimeout(() => window.location.href = "products.html", 800);
    } catch { showToast("Cannot connect. Try again.", "error"); }
    finally  { btn.disabled = false; btn.textContent = "Sign In →"; }
  }

  async function doRegister(e) {
    e.preventDefault();
    const name  = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const btn   = document.getElementById("btn-reg");
    btn.disabled = true; btn.textContent = "Creating account...";
    try {
      const res  = await fetch(`${API}/auth/register`, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ name, email }) });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || "Registration failed", "error"); return; }
      showToast("Account created! Please sign in.", "success");
      setTimeout(() => switchTab("login"), 900);
    } catch { showToast("Cannot connect. Try again.", "error"); }
    finally  { btn.disabled = false; btn.textContent = "Create Account →"; }
  }
</script>
</body>
</html>
