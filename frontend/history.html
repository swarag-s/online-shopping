<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — ShopEasy</title>
  <meta name="description" content="View all your past orders on ShopEasy."/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
<div id="site-header"></div>

<div class="container page-body">

  <div class="breadcrumb">
    <a href="index.html">Home</a><span>›</span>
    <span>My Orders</span>
  </div>

  <!-- MY ACCOUNT MINI SECTION -->
  <div style="display:grid;grid-template-columns:220px 1fr;gap:1.25rem;align-items:start;">

    <!-- Account sidebar -->
    <div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);">
        <div style="background:linear-gradient(135deg,var(--green),var(--green-dark));padding:1.25rem;color:#fff;">
          <div style="font-size:2rem;margin-bottom:.4rem;"><i class="ph ph-user"></i></div>
          <div id="account-name" style="font-weight:700;font-size:1rem;"></div>
          <div id="account-email" style="font-size:.75rem;opacity:.8;margin-top:2px;"></div>
        </div>
        <div style="padding:.75rem 0;">
          <a href="products.html" style="display:flex;align-items:center;gap:.6rem;padding:.6rem 1.1rem;font-size:.85rem;font-weight:500;color:var(--text-2);transition:all var(--t);" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''"><i class="ph ph-shopping-bag"></i> Continue Shopping</a>
          <a href="history.html" style="display:flex;align-items:center;gap:.6rem;padding:.6rem 1.1rem;font-size:.85rem;font-weight:600;color:var(--green);background:var(--green-light);"><i class="ph ph-package"></i> My Orders</a>
          <div style="height:1px;background:var(--border);margin:.25rem 0;"></div>
          <button onclick="logout()" style="display:flex;align-items:center;gap:.6rem;padding:.6rem 1.1rem;font-size:.85rem;font-weight:500;color:var(--text-muted);width:100%;text-align:left;transition:all var(--t);" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''"><i class="ph ph-sign-out"></i> Logout</button>
        </div>
      </div>
    </div>

    <!-- ORDERS LIST -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;">
        <h1 style="font-size:1.25rem;font-weight:800;">My Orders</h1>
        <div id="order-stats" style="font-size:.82rem;color:var(--text-muted);"></div>
      </div>

      <div id="orders-container">
        <div class="spinner"></div>
      </div>
    </div>

  </div>
</div>

<footer style="background:var(--text);color:rgba(255,255,255,0.5);padding:1.5rem;text-align:center;font-size:0.8rem;margin-top:2rem;">
  © 2025 <strong style="color:#fff;">ShopEasy</strong> — All rights reserved.
</footer>

<script src="app.js"></script>
<script>
  const user = requireAuth();
  document.getElementById("site-header").innerHTML = buildHeader("history");
  updateCartCount();

  if (user) {
    document.getElementById("account-name").textContent  = user.name;
    document.getElementById("account-email").textContent = user.email;
  }

  async function loadOrders() {
    const container = document.getElementById("orders-container");
    try {
      const res  = await fetch(`${API}/orders/history/${user.id}`);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error("Data was not an array");

      if (!data.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="ph ph-package" style="font-size: 3rem;"></i></div>
            <h3>No orders yet</h3>
            <p>When you place an order, it will appear here.</p>
            <a href="products.html" class="btn btn-green btn-lg">Start Shopping</a>
          </div>`;
        return;
      }

      // stats
      const totalSpent = data.reduce((s, r) => s + r.total_price, 0);
      document.getElementById("order-stats").innerHTML =
        `${data.length} order${data.length > 1 ? "s" : ""} &nbsp;·&nbsp; Total spent: <strong>${rupee(totalSpent)}</strong>`;

      container.innerHTML = data.map((row, i) => {
        // pick a fake-but-consistent icon per product name
        const iconSrc = PRODUCT_IMAGES[i % PRODUCT_IMAGES.length];
        return `
        <div class="order-card">
          <div class="order-card-head">
            <div class="order-card-head-col">
              <div class="label">Order Placed</div>
              <div class="val">${fmtDate(row.order_date)}</div>
            </div>
            <div class="order-card-head-col">
              <div class="label">Total</div>
              <div class="val">${rupee(row.total_price)}</div>
            </div>
            <div class="order-card-head-col">
              <div class="label">Ordered By</div>
              <div class="val">${row.customer}</div>
            </div>
            <div class="order-card-head-col">
              <div class="label">Order ID</div>
              <div class="val" style="color:var(--green);">#${String(row.order_id).padStart(5, "0")}</div>
            </div>
          </div>
          <div class="order-card-body">
            <div class="order-item-thumb"><img src="${iconSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" /></div>
            <div style="flex:1;">
              <div style="font-weight:700;font-size:.95rem;margin-bottom:3px;">${row.product}</div>
              <div style="font-size:.8rem;color:var(--text-muted);">Qty: ${row.quantity} &nbsp;·&nbsp; ${rupee(row.total_price)}</div>
              <div class="order-status" style="margin-top:6px;">Delivered</div>
            </div>
            <div style="text-align:right;">
              <button class="btn btn-outline-green btn-sm" onclick="reorder('${row.product}')">Buy Again</button>
            </div>
          </div>
        </div>`;
      }).join("");
    } catch (err) {
      console.error(err);
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i class="ph ph-wifi-slash" style="font-size: 3rem;"></i></div>
          <h3>Could not load orders</h3>
          <p>Error: ${err.message}</p>
        </div>`;
    }
  }

  function reorder(productName) {
    showToast(`Redirecting to ${productName}...`, "success");
    setTimeout(() => window.location.href = "products.html", 800);
  }

  loadOrders();
</script>
</body>
</html>
